
services:
  - type: static
    name: etha-rms-frontend
    env: node
    plan: free
    buildCommand: npm run build
    publishDir: out
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NEXT_TELEMETRY_DISABLED
        value: 1
    # Optimized for Render Static Site to ensure 'Always On' availability
