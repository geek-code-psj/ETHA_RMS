
services:
  - type: web
    name: render-hrms-dashboard
    env: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NEXT_TELEMETRY_DISABLED
        value: 1
    # Note: Static Site is preferred for pure frontend, 
    # but Web Service allows for full SSR if needed later.

databases:
  - name: hrms-db-sim
    plan: free
    # Simulates the PostgreSQL persistent layer for compliance with the prompt
